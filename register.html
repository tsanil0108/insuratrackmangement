<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InsuraTrack — Register</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="auth-page">
    <div class="orb-2"></div>
    <div class="auth-container">
      <div class="auth-logo">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <h1>InsuraTrack</h1>
        <p>Insurance Management System</p>
      </div>

      <div class="auth-card">
        <h2>Create account</h2>
        <p class="subtitle">Get started with InsuraTrack</p>

        <form class="auth-form" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label>Full Name *</label>
            <input type="text" id="name" placeholder="John Doe" required autocomplete="name">
          </div>
          <div class="form-group">
            <label>Email Address *</label>
            <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label>Password *</label>
            <div class="input-with-icon">
              <input type="password" id="password" placeholder="Min. 6 characters" required autocomplete="new-password">
              <button type="button" class="eye-toggle">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label>Admin Key <span style="font-weight:400;text-transform:none;">(optional)</span></label>
            <div class="admin-key-note">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              <span>Leave blank to register as a regular user. Provide the admin key to get admin privileges.</span>
            </div>
            <input type="text" id="adminKey" placeholder="Admin key (if you have one)">
          </div>
          <button type="submit" class="btn btn-primary" id="register-btn">Create Account</button>
        </form>
      </div>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      authUtils.redirectIfLoggedIn();
      initPasswordToggle();
    });
  </script>
</body>
</html>
