<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — InsuraTrack</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-logo">
        <div class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <h1>InsuraTrack</h1>
        <p>Insurance Management System</p>
      </div>

      <div class="auth-card">
        <h2>Create account</h2>
        <p class="subtitle">Fill in your details to get started</p>

        <form class="auth-form" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label>Full Name *</label>
            <input
              type="text"
              id="name"
              placeholder="John Doe"
              autocomplete="name"
              required
            >
          </div>

          <div class="form-group">
            <label>Email Address *</label>
            <input
              type="email"
              id="email"
              placeholder="you@company.com"
              autocomplete="email"
              required
            >
          </div>

          <div class="form-group">
            <label>Password *</label>
            <div class="input-with-icon">
              <input
                type="password"
                id="password"
                placeholder="Min. 6 characters"
                autocomplete="new-password"
                required
                minlength="6"
              >
              <button type="button" class="eye-toggle" tabindex="-1">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label>Admin Key <span style="color:var(--text-muted);font-weight:400">(optional)</span></label>
            <input
              type="password"
              id="adminKey"
              placeholder="Leave blank for standard user"
            >
          </div>

          <div class="admin-key-note">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:2px">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            Enter the admin key only if you have administrator privileges. Leave blank to create a regular user account.
          </div>

          <button type="submit" class="btn btn-primary" id="register-btn">
            Create Account
          </button>
        </form>

        <div class="auth-footer">
          Already have an account? <a href="login.html">Sign in</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script>
    authUtils.redirectIfLoggedIn();
    document.addEventListener('DOMContentLoaded', initPasswordToggle);
  </script>
</body>
</html>
